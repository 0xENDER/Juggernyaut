on:
  workflow_call: # Added this line to make it reusable
    inputs:
      mac_system:
        required: false
        type: string
        default: macos-latest
      build_platform:
        required: true
        type: string
      build_platform_name:
        required: true
        type: string
      build_mode:
        required: true
        type: string
      bundle_binaries:
        required: true
        type: boolean
      release_version:
        required: false
        type: string
        default: 0.0.0-github_mac.000
      run_tests:
        type: boolean
        default: true
      security_analysis:
        type: boolean
        default: false

jobs:

  # macOS
  build-binaries-on-macos:
    name: macOS ${{inputs.build_platform_name}}
    runs-on: ${{inputs.mac_system}}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Initialize CodeQL
      if: inputs.security_analysis
      uses: github/codeql-action/init@v4
      with:
        languages: 'c-cpp'

    - name: Setup CMake 4.2+
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: '4.2.x'

    - name: Set up JDK 23
      uses: actions/setup-java@v5
      with:
        java-version: '23'
        distribution: 'temurin'

    - name: Install dependencies
      run: |
        brew install --formula cmake --quiet

    - name: Install Qt Installer Framework (IFW)
      if: inputs.bundle_binaries && (inputs.build_platform_name == 'x86_64' || inputs.build_platform_name == 'arm64')
      uses: jurplel/install-qt-action@v4
      with:
        no-qt-binaries: true
        # The syntax for tools is often <tool_name>,<version>,<architecture_identifier>
        tools: 'tools_ifw'
        set-env: false

    - name: Make the ".build" directory
      run: mkdir ${{github.workspace}}/.build

    - name: Configure CMake
      run: |
        cmake .. -DCMAKE_BUILD_TYPE=${{inputs.build_mode}} -DCMAKE_UNIX_GENERATOR_PLATFORM=${{inputs.build_platform}} \
          -DJUG_RELEASE_VERSION="${{inputs.release_version}}" -DJUG_BUILD_TESTS=${{inputs.run_tests}} \
          -DJUG_BUILD_PLATFORM_NAME=${{inputs.build_platform_name}}
      working-directory: .build

    - name: Build
      run: cmake --build . --config ${{inputs.build_mode}} --parallel 2 --verbose
      working-directory: .build

    - name: Run Tests (optional)
      if: inputs.run_tests
      run: ctest -C ${{inputs.build_mode}} -V -j 2
      working-directory: .build

    - name: Install (optional)
      if: inputs.bundle_binaries
      run: cmake --install . --config ${{inputs.build_mode}} --parallel 2 --verbose
      working-directory: .build

    - name: Package Native Installer (optional)
      if: inputs.bundle_binaries && (inputs.build_platform_name == 'x86_64' || inputs.build_platform_name == 'arm64')
      run: cpack --config ../.build/CPackConfig.cmake -C ${{inputs.build_mode}}
      working-directory: .dist

    - name: Extract version (optional)
      if: inputs.bundle_binaries
      run: |
        set -e
        VERSION=$(${{github.workspace}}/.dist/${{inputs.build_mode}}/${{inputs.build_platform_name}}/bin/jug-cmp --version \
          | head -n 1)
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Perform CodeQL Analysis
      if: inputs.security_analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:c-cpp"

    - name: Upload Binaries Artifact (optional)
      if: inputs.bundle_binaries
      uses: actions/upload-artifact@v7
      with:
        name: Juggernyaut-${{inputs.build_mode}}-v${{env.VERSION}}-macOS-${{inputs.build_platform_name}}
        path: ${{github.workspace}}/.dist/${{inputs.build_mode}}/${{inputs.build_platform_name}}/

    - name: Upload Installer Artifact (optional)
      if: inputs.bundle_binaries && (inputs.build_platform_name == 'x86_64' || inputs.build_platform_name == 'arm64')
      uses: actions/upload-artifact@v7
      with:
        name: Juggernyaut-Installer-macOS-${{inputs.build_platform_name}}
        path: ${{github.workspace}}/.dist/Juggernyaut-Installer-v${{env.VERSION}}-${{inputs.build_platform_name}}.dmg
