name: Binaries
on:
  push:
    branches:
    - "main"
  pull_request:
    branches:
    - "main"

jobs:

  # New dependency submission job
  dependency-submission:
    name: Cmake Dependency Graph
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Scan and Submit
        uses: philips-forks/cmake-dependency-submission@main
        # Uses 'glob' mode by default, scanning the repo without building

  # Debug
  build-binaries-debug:
    name: Debug
    uses: ./.github/workflows/_binaries_dynamic_build.yml
    with:
      build_mode: Debug
      bundle_binaries: false
      full_build:
        ${{(github.event_name == 'push' && endsWith(github.event.head_commit.message, ' -FULL')) ||
        github.event_name == 'pull_request'}}

  # Release
  build-binaries-release:
    name: Release
    uses: ./.github/workflows/_binaries_dynamic_build.yml
    if: ${{(github.event_name == 'push' && endsWith(github.event.head_commit.message, ' -REL')) || github.event_name == 'pull_request'}}
    needs:
      - build-binaries-debug
    with:
      build_mode: Release
      bundle_binaries: false
      full_build:
        ${{(github.event_name == 'push' && endsWith(github.event.head_commit.message, ' -FULL')) ||
        github.event_name == 'pull_request'}}
