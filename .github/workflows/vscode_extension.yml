name: VSCode Extension
on:
  push:
    branches: 
    - "main"
  pull_request:
    branches: 
    - "main"
  workflow_call: # Added this line to make it reusable
    # Add inputs here if needed. Example:
    inputs:
      upload_artifact:
        required: false
        type: boolean
        default: false

jobs:

  # Windows
  build-vscode-extension-on-windows-2025-vs2026:
    name: Build on Windows
    runs-on: windows-2025-vs2026

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup NodeJS
      uses: actions/setup-node@v6
      with:
        node-version: '20.x'

    - name: Install NodeJS dependencies
      run: npm i
      working-directory: ${{github.workspace}}/extensions/VSCode

    - name: Package the VSCode Extension
      run: npm run win-package
      working-directory: ${{github.workspace}}/extensions/VSCode

    - name: Upload Extension Artifact (optional)
      if: inputs.upload_artifact
      uses: actions/upload-artifact@v7
      with:
        name: Juggernyaut-VSCode-Extensions
        path: ${{github.workspace}}/extensions/VSCode/juggernyaut-*.vsix

    - name: Upload Web Extension Artifact (optional)
      if: inputs.upload_artifact
      uses: actions/upload-artifact@v7
      with:
        name: Juggernyaut-VSCode-Extensions-Web
        path: ${{github.workspace}}/extensions/VSCode/juggernyaut-web-*.vsix
